{% extends "base_auth.html" %}

{% block title %}Ingia - CIRS{% endblock %}

{% block auth_content %}
<div class="auth-header text-center">
    <i class="fas fa-shield-alt fa-3x text-primary"></i>
    <h3 class="mt-3">CIRS</h3>
    <p class="text-muted">Cyber Incident Reporting System</p>
    <p class="text-muted small">Arusha Regional Hospital</p>
</div>

<form method="POST" action="{% url 'login' %}">
    {% csrf_token %}
    <div class="mb-3">
        <label for="username" class="form-label">Jina la Mtumiaji</label>
        <div class="input-group">
            <span class="input-group-text"><i class="fas fa-user"></i></span>
            <input type="text" class="form-control" id="username" name="username" placeholder="Ingiza jina la mtumiaji" required>
        </div>
    </div>
    <div class="mb-3">
        <label for="password" class="form-label">Neno Siri</label>
        <div class="input-group">
            <span class="input-group-text"><i class="fas fa-lock"></i></span>
            <input type="password" class="form-control" id="password" name="password" placeholder="Ingiza neno siri" required>
            <button class="btn btn-outline-secondary" type="button" onclick="togglePassword()">
                <i class="fas fa-eye" id="eyeIcon"></i>
            </button>
        </div>
    </div>
    <button type="submit" class="btn btn-primary w-100">
        <i class="fas fa-sign-in-alt me-2"></i>Ingia
    </button>
</form>

<div class="auth-footer text-center mt-4">
    <p>Hujasajiliwa? <a href="{% url 'register' %}">Jiandikisha Sasa</a></p>
    <small class="text-muted">&copy; 2026 CIRS - Arusha Regional Hospital</small>
</div>

<script>
function togglePassword() {
    const password = document.getElementById('password');
    const eyeIcon = document.getElementById('eyeIcon');
    if (password.type === 'password') {
        password.type = 'text';
        eyeIcon.className = 'fas fa-eye-slash';
    } else {
        password.type = 'password';
        eyeIcon.className = 'fas fa-eye';
    }
}
</script>
{% endblock %}
